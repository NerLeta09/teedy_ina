<!-- approveModal.html -->
<div class="modal-header">
  <h3 class="modal-title">User Register Request: {{ request.username }}</h3>
</div>
<div class="modal-body">
  <p>A new user wants to register.</p>
</div>
<div class="modal-footer">
  <button class="btn btn-primary" ng-click="approve()">Approve</button>
  <button class="btn btn-default" ng-click="reject()">Reject</button>
</div>
